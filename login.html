<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0a0e, #2d1b1f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-box {
            background: #2d1b1f;
            padding: 2rem 1.5rem;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #3d2b2f;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .login-box .icon {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 0.8rem;
        }
        .login-box h1 {
            color: #f0e0e4;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }
        .login-box p {
            color: #7a5a62;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .login-box .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .login-box .form-group label {
            color: #f0e0e4;
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .login-box .form-group label i {
            color: #ff6b8a;
            margin-right: 6px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #3d2b2f;
            border-radius: 12px;
            font-size: 1rem;
            background: #1a0a0e;
            color: #f0e0e4;
            transition: border 0.3s;
            -webkit-appearance: none;
        }
        .login-box .form-group input:focus {
            outline: none;
            border-color: #ff6b8a;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            width: 100%;
            min-height: 50px;
            background: #ffd700;
            color: #1a0a0e;
        }
        .btn:active {
            background: #f0c000;
            transform: scale(0.97);
        }
        .error {
            color: #fc8181;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .error.show {
            display: block;
        }
        .back-link {
            display: block;
            margin-top: 1.2rem;
            color: #7a5a62;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.85rem;
        }
        .back-link:active {
            color: #ff6b8a;
        }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #2d1b1f;
            color: #f0e0e4;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.4s;
            z-index: 9999;
            max-width: 90%;
            border: 1px solid #ff6b8a;
            font-size: 0.9rem;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        @media (min-width: 500px) {
            .login-box {
                padding: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="icon"><i class="fas fa-lock"></i></div>
        <h1>Admin Login</h1>
        <p>Masukkan kredensial untuk mengelola blog</p>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required autocomplete="username" />
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div class="error" id="loginError">Username atau password salah!</div>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Blog</a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var error = document.getElementById('loginError');

            if (!username || !password) {
                error.textContent = 'Username dan password harus diisi!';
                error.classList.add('show');
                return;
            }

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    window.location.href = '/admin/';
                } else {
                    error.textContent = data.error || 'Username atau password salah!';
                    error.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            })
            .catch(function() {
                error.textContent = 'Gagal terhubung ke server!';
                error.classList.add('show');
            });
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>

</body>
</html>
